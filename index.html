<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#000000" />
    <title>xDustAI</title>
    <link rel="icon" href="/icon.ico" />
    <link rel="manifest" href="./assets/manifest-DTIWuWXv.json" />
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
      body {
        font-family: 'Outfit', sans-serif;
        margin: 0;
        overflow: hidden; /* Prevent body scroll, handle in app */
        background-color: #000;
        user-select: none; /* Make it feel like an app, not a website */
      }
      /* Allow text selection inside chat messages and inputs */
      .select-text {
        user-select: text;
      }
      input, textarea {
        user-select: text;
      }

      /* Custom Scrollbar */
      ::-webkit-scrollbar {
        width: 6px;
      }
      ::-webkit-scrollbar-track {
        background: transparent;
      }
      ::-webkit-scrollbar-thumb {
        background: rgba(255, 255, 255, 0.2);
        border-radius: 10px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: rgba(255, 255, 255, 0.4);
      }
      
      /* Enhanced Liquid Glass Effect */
      .liquid-glass {
        background: linear-gradient(145deg, rgba(255, 255, 255, 0.07) 0%, rgba(255, 255, 255, 0.01) 100%);
        backdrop-filter: blur(30px) saturate(130%);
        -webkit-backdrop-filter: blur(30px) saturate(130%);
        border: 1px solid rgba(255, 255, 255, 0.12);
        border-top: 1px solid rgba(255, 255, 255, 0.25);
        border-left: 1px solid rgba(255, 255, 255, 0.25);
        box-shadow: 
          0 10px 40px -10px rgba(0, 0, 0, 0.5), 
          inset 0 0 0 1px rgba(255, 255, 255, 0.05);
        transition: all 0.4s cubic-bezier(0.33, 1, 0.68, 1);
      }
      
      /* Only apply hover effects to elements marked as interactive */
      .liquid-glass-interactive:hover {
        background: linear-gradient(145deg, rgba(255, 255, 255, 0.12) 0%, rgba(255, 255, 255, 0.03) 100%);
        box-shadow: 
          0 15px 50px -10px rgba(0, 0, 0, 0.6), 
          inset 0 0 0 1px rgba(255, 255, 255, 0.1);
        border-color: rgba(255, 255, 255, 0.2);
        border-top-color: rgba(255, 255, 255, 0.4);
        transform: translateY(-2px);
      }
      
      .liquid-glass-strong {
        background: rgba(15, 15, 25, 0.65);
        backdrop-filter: blur(40px) saturate(150%);
        -webkit-backdrop-filter: blur(40px) saturate(150%);
        border: 1px solid rgba(255, 255, 255, 0.15);
        border-top: 1px solid rgba(255, 255, 255, 0.3);
        box-shadow: 0 20px 60px -15px rgba(0, 0, 0, 0.7);
      }

      /* Enhanced Animations */
      @keyframes fadeOutDown {
        from { opacity: 1; transform: translateY(0) scale(1); }
        to { opacity: 0; transform: translateY(20px) scale(0.95); }
      }
      
      @keyframes slideInUp {
        0% { opacity: 0; transform: translateY(20px) scale(0.98); }
        100% { opacity: 1; transform: translateY(0) scale(1); }
      }

      /* Reduced translate distance to prevent clipping in overflow:hidden containers */
      @keyframes slideInRight {
        from { opacity: 0; transform: translateX(15px); filter: blur(4px); }
        to { opacity: 1; transform: translateX(0); filter: blur(0); }
      }

      @keyframes slideInLeft {
        from { opacity: 0; transform: translateX(-15px); filter: blur(4px); }
        to { opacity: 1; transform: translateX(0); filter: blur(0); }
      }

      @keyframes slideDownBouncy {
        0% { opacity: 0; transform: translateY(-100%) scale(0.9); }
        60% { opacity: 1; transform: translateY(10%) scale(1.02); }
        100% { opacity: 1; transform: translateY(0) scale(1); }
      }

      @keyframes float {
        0% { transform: translateY(0px); }
        50% { transform: translateY(-12px); }
        100% { transform: translateY(0px); }
      }

      @keyframes glow-pulse {
        0% { filter: drop-shadow(0 0 5px rgba(255,255,255,0.3)); }
        50% { filter: drop-shadow(0 0 12px rgba(255,255,255,0.5)); }
        100% { filter: drop-shadow(0 0 5px rgba(255,255,255,0.3)); }
      }
      
      /* Smooth Wave Animation for Typing Dots */
      @keyframes wave {
        0%, 100% { transform: translateY(0); }
        50% { transform: translateY(-5px); }
      }

      /* Bouncy Pop Animation with Blur */
      @keyframes popBounce {
        0% { opacity: 0; transform: translateY(15px) scale(0.95); filter: blur(8px); }
        60% { opacity: 1; transform: translateY(-2px) scale(1.02); filter: blur(0px); }
        100% { opacity: 1; transform: translateY(0) scale(1); filter: blur(0px); }
      }
      
      /* Smooth Zoom In for Images */
      @keyframes zoomIn {
        0% { opacity: 0; transform: scale(0.9); filter: blur(10px); }
        100% { opacity: 1; transform: scale(1); filter: blur(0); }
      }

      /* Futuristic Scanline for QR Code */
      @keyframes scan {
        0% { top: 0%; opacity: 0; }
        10% { opacity: 1; }
        90% { opacity: 1; }
        100% { top: 100%; opacity: 0; }
      }
      
      .animate-exit {
        animation: fadeOutDown 0.3s ease-in forwards;
      }

      .animate-slide-up {
        animation: slideInUp 0.5s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
      }

      .animate-slide-in-right {
        animation: slideInRight 0.4s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
      }

      .animate-slide-in-left {
        animation: slideInLeft 0.4s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
      }
      
      .animate-slide-down-bounce {
        animation: slideDownBouncy 0.8s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
      }

      .animate-pop-bounce {
        animation: popBounce 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
      }
      
      .animate-zoom-in {
        animation: zoomIn 0.4s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
      }

      .animate-float {
        animation: float 5s ease-in-out infinite;
      }

      .animate-glow {
        animation: glow-pulse 3s infinite;
      }

      .animate-wave {
        animation: wave 1.2s ease-in-out infinite;
      }

      .transition-bouncy {
        transition: all 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
      }
    </style>
